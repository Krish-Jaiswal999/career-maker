services:
  - type: web
    name: career-maker-backend
    env: python
    plan: free
    region: oregon
    repo: "${REPO}" # replace in Render dashboard or with your own repo url
    branch: main
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT"
    workingDirectory: backend
    envVars:
      - key: DATABASE_URL
        value: "postgresql://career_user:YOUR_SECURE_PASSWORD@postgres:5432/career_maker_db"
      - key: REDIS_URL
        value: "redis://:YOUR_REDIS_PASSWORD@redis:6379"
      - key: SECRET_KEY
        value: "replace-with-production-secret"
      - key: ENVIRONMENT
        value: "production"
      - key: ALLOWED_ORIGINS
        value: "[\"https://your-vercel-domain.vercel.app\"]"
