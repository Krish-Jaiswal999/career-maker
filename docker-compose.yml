version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: career_maker_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-career_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      POSTGRES_DB: ${POSTGRES_DB:-career_maker_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-career_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - career_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: career_maker_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-change-me-in-production}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - career_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - ENVIRONMENT=${ENVIRONMENT:-production}
    container_name: career_maker_api
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-career_user}:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/${POSTGRES_DB:-career_maker_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-in-production}@redis:6379
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-False}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - career_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:latest-alpine
    container_name: career_maker_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - career_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Certbot for SSL certificates (Let's Encrypt)
  certbot:
    image: certbot/certbot:latest
    container_name: career_maker_certbot
    volumes:
      - certbot_data:/var/www/certbot:rw
      - ./ssl:/etc/letsencrypt:rw
    entrypoint: /bin/sh -c "certbot certonly --webroot -w /var/www/certbot --email ${CERTBOT_EMAIL} -d ${DOMAIN_NAME} --agree-tos --non-interactive || true"
    restart: "no"
    networks:
      - career_network
    depends_on:
      - nginx

volumes:
  postgres_data:
  redis_data:
  certbot_data:

networks:
  career_network:
    driver: bridge
